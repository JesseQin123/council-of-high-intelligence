name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="council-of-high-intelligence-${VERSION}.tar.gz"
          tar --exclude='./.git' \
              --exclude='./.github' \
              --exclude='./demos' \
              --exclude='.DS_Store' \
              --exclude='./.gstack' \
              --exclude='*.log' \
              -czf "../${ARCHIVE}" .
          echo "ARCHIVE=$(pwd)/../${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Extract release notes from CHANGELOG.md
        # Notes go through a file, never through ${{ }} interpolation into a
        # run script — CHANGELOG text contains backticks, which the shell
        # would execute as command substitutions (this bit v1.2.0).
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > "${RUNNER_TEMP}/release-notes.md"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md" \
            "${ARCHIVE}"
